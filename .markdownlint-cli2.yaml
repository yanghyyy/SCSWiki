config:
  MD013: false
  MD025:
    front_matter_title: ''
  MD024:
    siblings_only: true
  MD033:
    allowed_elements:
      - ContentMeta
      - HomePage
      - a
      - div
      - figure
      - h1
      - img
      - main
      - p
      - section
      - span
      - strong
